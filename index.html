<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あさあきTODO</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fffafc;
      color: #444;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 20px;
      padding: 20px;
      align-items: start;
    }

    .character {
      background: #ffffff;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
      display:flex;
      flex-direction: column;
      align-items: center;
    }

    .character-line{
      margin-top: 12px;
      padding: 12px;
      background: #f9fbff;
      border: 1px solid #e5eefc;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: #555;
      text-align: left;
      min-height: 72px;
      width: 100%;
      max-width: 260px;
}

    .asa .character-line{
     background: #fff0f6;
     boeder: 1px solid #f8c6da;
}

    .asa{
      box-shadow: 0 8px 24px rgba(255,180,200,0.2);
}

    .akira .character-line{
     background: #f4f0ff;
     border: 1px solid #d8ccff;
}

    .akira{
      box-shadow:0 8px 24px rgba(180,170,255,0.2);
}

    .character img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 16px;
      object-fit: cover;
      background: #f5f5f5;
    }

    .character-name {
      margin-top: 12px;
      font-weight: bold;
      font-size: 18px;
    }

    .center-panel {
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    .input-area input:focus {
      border-color: #f0a8c1;
    }

    .input-area button {
      border: none;
      background: #f6b8cf;
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      opacity: 0.9;
    }

    .progress-section {
      margin-bottom: 24px;
      padding: 14px;
      background: #fff6fa;
      border-radius: 16px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .progress-bar-bg {
      width: 100%;
      height: 18px;
      background: #f1dce5;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f6b8cf, #b9d8ff);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fcfcfc;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .task-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 16px;
      word-break: break-word;
    }

    .task-text.done {
      color: #999;
      text-decoration: line-through;
    }

    .delete-btn {
      border: none;
      background: #f3f3f3;
      color: #666;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #e9e9e9;
    }

    .empty-text {
      color: #888;
      text-align: center;
      padding: 18px 10px;
      background: #fafafa;
      border-radius: 14px;
      border: 1px dashed #ddd;
    }

    .dialogue-box {
      margin-top: 24px;
      background: #f9fbff;
      border-radius: 18px;
      padding: 18px;
      border: 1px solid #e5eefc;
    }

    .dialogue-title {
      font-weight: bold;
      margin-bottom: 12px;
      color: #5c6f8f;
    }

    .line {
      margin: 8px 0;
      line-height: 1.7;
    }

    .speaker {
      font-weight: bold;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #888;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .character {
        order: 2;
      }

      .center-panel {
        order: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="character asa">
      <img src="asaka.png" alt="あさか">
      <div id="asaLine" class="character-line"></div>
</div>


    <main class="center-panel">
      <h1>あさあきTODO</h1>
      <div class="subtitle">あさちゃんとあきらちゃんが、今日の作業を見守ってくれる簡易TODO</div>

      <div class="input-area">
        <input id="taskInput" type="text" placeholder="タスクを入力">
        <button id="addButton">追加</button>
      </div>

      <section class="progress-section">
        <div class="progress-top">
          <span>今日の進捗</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <ul id="taskList" class="task-list"></ul>
      <div id="emptyText" class="empty-text">まだタスクがありません。ひとつ追加してみよう！</div>

           <div class="footer-note">ブラウザに自動保存されます</div>
    </main>

    <div class="character akira">
      <img src="akira.png" alt="あきら">
      <div id="akiraLine" class="character-line"><div>
  </div>


  <script>
    const STORAGE_KEY = "asaaki_todo_tasks";

    const dialoguePatterns = {
      empty: [
        {
          asa: "あさ：今日はどれからいこっか！",
          akira: "あきら：無理のない順番でやろー"
        },
        {
          asa: "あさ：まずはひとつ！決めちゃお！",
          akira: "あきら：何事もやってみるべしー"
        }
      ],
      zero: [
        {
          asa: "あさ：よーし、ここからだね！",
          akira: "あきら：焦らなくていいから、ひとつずついこう"
        },
        {
          asa: "あさ：今日はどれから片づける？",
          akira: "あきら：どこまでも付き合うよー"
        }
      ],
      low: [
        {
          asa: "あさ：いい感じ！えら～い！",
          akira: "あきら：おー！ ちゃんと進んでるじゃん！　さすがあ♪"
        },
        {
          asa: "あさ：始めることが一番大事だからね♪",
          akira: "あきら：最初の一歩って、思ったより大きいから"
        }
      ],
      mid: [
        {
          asa: "あさ：おーっ！ かなり順調だよ！",
          akira: "あきら：ここまで来たら、もう十分すごいと思う"
        },
        {
          asa: "あさ：うんうん！ がんばれがんばれ！",
          akira: "あきら：落ち着いて続けたら、ちゃんと終わりが見えるよ"
        }
      ],
      high: [
        {
          asa: "あさ：あとちょっと！もうひと踏ん張りだね！",
          akira: "あきら：ここまで進めたの、本当にすごいよ"
        },
        {
          asa: "あさ：終わりが見えてきたね！",
          akira: "あきら：最後までつきあうよ♪でも無理しすぎないでよ？"
        }
      ],
      complete: [
        {
          asa: "あさ：やったー！！全部終わり！！　すっごーい！",　
          akira: "あきら：ほんとにおつかれさま"
        },
        {
          asa: "あさ：完了おめでとう！えらすぎるー！",
          akira: "あきら：最後までやりきれたね。すごい"
        }
      ]
    };

    const taskInput = document.getElementById("taskInput");
    const addButton = document.getElementById("addButton");
    const taskList = document.getElementById("taskList");
    const emptyText = document.getElementById("emptyText");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const asaLine = document.getElementById("asaLine");
    const akiraLine = document.getElementById("akiraLine");

    let tasks = loadTasks();

    function loadTasks() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
      } catch (error) {
        console.error("保存データの読み込みに失敗しました:", error);
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function getRandomPattern(patternArray) {
      return patternArray[Math.floor(Math.random() * patternArray.length)];
    }

    function getDialogue() {
      if (tasks.length === 0) {
        return getRandomPattern(dialoguePatterns.empty);
      }

      const doneCount = tasks.filter(task => task.done).length;
      const totalCount = tasks.length;
      const percent = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

      if (percent === 0) {
        return getRandomPattern(dialoguePatterns.zero);
      } else if (percent < 50) {
        return getRandomPattern(dialoguePatterns.low);
      } else if (percent < 100) {
        return getRandomPattern(dialoguePatterns.high);
      } else {
        return getRandomPattern(dialoguePatterns.complete);
      }
    }

    function updateDialogue() {
      if (tasks.length === 0) {
        const dialogue = getRandomPattern(dialoguePatterns.empty);
        asaLine.textContent = dialogue.asa;
        akiraLine.textContent = dialogue.akira;
        return;
      }

      const doneCount = tasks.filter(task => task.done).length;
      const totalCount = tasks.length;
      const percent = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

      let pattern;

      if (percent === 0) {
        pattern = getRandomPattern(dialoguePatterns.zero);
      } else if (percent < 50) {
        pattern = getRandomPattern(dialoguePatterns.low);
      } else if (percent < 80) {
        pattern = getRandomPattern(dialoguePatterns.mid);
      } else if (percent < 100) {
        pattern = getRandomPattern(dialoguePatterns.high);
      } else {
        pattern = getRandomPattern(dialoguePatterns.complete);
      }

      asaLine.textContent = pattern.asa;
      akiraLine.textContent = pattern.akira;
    }

    function updateProgress() {
      const totalCount = tasks.length;
      const doneCount = tasks.filter(task => task.done).length;
      const percent = totalCount === 0 ? 0 : Math.round((doneCount / totalCount) * 100);

      progressText.textContent = percent + "%";
      progressBar.style.width = percent + "%";
    }

    function renderTasks() {
      taskList.innerHTML = "";

      if (tasks.length === 0) {
        emptyText.style.display = "block";
      } else {
        emptyText.style.display = "none";
      }

      tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.className = "task-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => {
          tasks[index].done = checkbox.checked;
          saveTasks();
          renderTasks();
          updateProgress();
          updateDialogue();
        });

        const span = document.createElement("span");
        span.className = "task-text";
        if (task.done) {
          span.classList.add("done");
        }
        span.textContent = task.text;

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-btn";
        deleteButton.textContent = "削除";
        deleteButton.addEventListener("click", () => {
          tasks.splice(index, 1);
          saveTasks();
          renderTasks();
          updateProgress();
          updateDialogue();
        });

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(deleteButton);
        taskList.appendChild(li);
      });
    }

    function addTask() {
      const text = taskInput.value.trim();

      if (!text) {
        return;
      }

      tasks.push({
        text: text,
        done: false
      });

      taskInput.value = "";
      saveTasks();
      renderTasks();
      updateProgress();
      updateDialogue();
    }

    addButton.addEventListener("click", addTask);

    taskInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addTask();
      }
    });

    renderTasks();
    updateProgress();
    updateDialogue();
  </script>
</body>
</html>
